<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- ✅ Sửa branding: GameBooster → SuperPing -->
<title>SuperPing — Get Key</title>
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg: #04060d;
    --card: rgba(10,14,26,0.85);
    --accent: #00e5ff;
    --accent2: #7b61ff;
    --green: #00ffaa;
    --text: #e8eaf0;
    --muted: rgba(200,210,230,0.45);
    --border: rgba(0,229,255,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  /* ✅ flex-column để footer dính đáy */
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-orb {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%; filter: blur(80px);
    animation: orbFloat 10s ease-in-out infinite alternate;
  }
  .bg-orb-1 {
    width: 600px; height: 600px; top: -200px; left: -200px;
    background: rgba(0,229,255,0.05);
  }
  .bg-orb-2 {
    width: 400px; height: 400px; bottom: -100px; right: -100px;
    background: rgba(123,97,255,0.06);
    animation-delay: -4s;
    animation-direction: alternate-reverse;
  }
  @keyframes orbFloat {
    from { transform: scale(1) translate(0,0); }
    to   { transform: scale(1.2) translate(15px,-15px); }
  }

  /* ── NAV — giống trang chủ ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(4,6,13,0.7);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand {
    font-size: 1.1rem; font-weight: 800; letter-spacing: -0.3px;
    display: flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--text);
  }
  .nav-brand span { color: var(--accent); }
  .nav-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 10px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50%      { opacity:0.6; transform:scale(0.85); }
  }
  .nav-badge {
    font-size: 0.62rem; color: var(--accent);
    background: rgba(0,229,255,0.1); border: 1px solid rgba(0,229,255,0.25);
    padding: 3px 10px; border-radius: 20px;
  }

  /* ── MAIN — flex:1 để footer dính đáy ── */
  .main-content {
    position: relative; z-index: 1;
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
  }

  /* ── CARD ── */
  .card {
    width: 100%; max-width: 420px;
    background: var(--card);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 28px;
    padding: 40px 36px;
    backdrop-filter: blur(24px);
    box-shadow: 0 0 80px rgba(0,229,255,0.07);
    text-align: center;
    animation: fadeUp 0.6s ease forwards;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 28px 28px 0 0;
  }
  .card::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.04), transparent 60%);
    pointer-events: none; border-radius: 28px;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .card-icon-wrap {
    width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 18px;
    background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(123,97,255,0.12));
    border: 1px solid rgba(0,229,255,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
    box-shadow: 0 0 30px rgba(0,229,255,0.1);
    animation: floatIcon 3s ease-in-out infinite alternate;
  }
  @keyframes floatIcon {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }
  .card-title {
    font-size: 1.5rem; font-weight: 800;
    letter-spacing: -0.5px; margin-bottom: 6px;
  }
  .card-title span { color: var(--accent); }
  .card-sub {
    font-size: 0.78rem; color: var(--muted);
    line-height: 1.5; margin-bottom: 28px;
  }

  /* ── DATETIME ── */
  .datetime-row {
    display: flex; align-items: center; justify-content: center;
    gap: 16px; margin-bottom: 28px;
    padding: 14px 18px;
    background: rgba(0,229,255,0.04);
    border: 1px solid rgba(0,229,255,0.1);
    border-radius: 12px;
  }
  .datetime-item { text-align: center; }
  .datetime-val {
    font-size: 1rem; font-weight: 700; color: var(--accent);
    display: block;
  }
  .datetime-lbl {
    font-size: 0.6rem; color: var(--muted); margin-top: 2px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .datetime-sep { color: var(--border); font-size: 1.2rem; }

  /* ── KEY INPUT ── */
  .key-section { margin-bottom: 20px; }
  .key-label {
    font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 10px; display: block; text-align: left;
  }
  .key-input-wrap { position: relative; }
  .key-input {
    width: 100%;
    padding: 16px 52px 16px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.9rem; font-weight: 700;
    text-align: center;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(0,229,255,0.2);
    border-radius: 14px;
    color: var(--accent);
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: transparent;
  }
  .key-input:focus { border-color: rgba(0,229,255,0.4); box-shadow: 0 0 20px rgba(0,229,255,0.1); }
  .key-input::placeholder { color: rgba(200,210,230,0.2); }
  .copy-icon-btn {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 0.9rem; transition: color 0.2s;
    padding: 4px;
  }
  .copy-icon-btn:hover { color: var(--accent); }

  /* ── BUTTONS ── */
  .btn-row { display: flex; flex-direction: column; gap: 10px; }
  .btn {
    width: 100%; padding: 14px;
    border-radius: 14px; border: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.92rem; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:hover::after { opacity: 1; }
  .btn:active { transform: translateY(0); }

  .btn-copy {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000; box-shadow: 0 4px 24px rgba(0,229,255,0.2);
  }
  .btn-copy:hover { box-shadow: 0 8px 36px rgba(0,229,255,0.35); }

  .btn-music {
    background: rgba(255,255,255,0.05);
    color: var(--text); border: 1px solid var(--border);
  }
  .btn-music:hover { border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.06); }
  .btn-music.playing { border-color: rgba(0,255,170,0.3); color: var(--green); background: rgba(0,255,170,0.05); }

  /* ── TOAST ── */
  .toast {
    position: fixed; top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(10,14,26,0.95); border: 1px solid rgba(0,229,255,0.3);
    color: var(--text); padding: 12px 24px; border-radius: 50px;
    font-size: 0.82rem; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast i { color: var(--green); }
  .toast.error { border-color: rgba(255,77,109,0.4); }
  .toast.error i { color: #ff4d6d; }

  /* ── FOOTER — giống trang chủ ── */
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    background: rgba(10,14,26,0.6);
    backdrop-filter: blur(12px);
    padding: 32px 24px;
  }
  .footer-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 12px;
  }
  .footer-copy { font-size: 0.78rem; color: var(--muted); }
  .footer-copy span { color: var(--accent); font-weight: 700; }
  .footer-links { display: flex; gap: 18px; }
  .footer-links a {
    font-size: 0.75rem; color: rgba(0,229,255,0.5);
    text-decoration: none; transition: color 0.2s; /* ✅ thêm property */
  }
  .footer-links a:hover { color: var(--accent); }

  /* ── RESPONSIVE ── */
  @media (max-width: 460px) {
    .card { padding: 32px 22px; }
  }
  @media (max-width: 600px) {
    .footer-inner { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div id="toast" class="toast">
  <i class="fas fa-check-circle"></i>
  <span>Đã copy key!</span>
</div>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- ✅ Nav đồng bộ với trang chủ -->
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-dot"></div>
    Zew<span>Ping</span>
  </a>
  <span class="nav-badge">v1.1-Beta_1</span>
</nav>

<!-- ✅ Wrapper để footer dính đáy -->
<div class="main-content">
  <div class="card">

    <div class="card-icon-wrap">🔑</div>
    <div class="card-title">Key <span>Của Bạn</span></div>
    <div class="card-sub">Sao chép key bên dưới và dán vào app để kích hoạt</div>

    <div class="datetime-row">
      <div class="datetime-item">
        <span class="datetime-val" id="clockVal">--:--:--</span>
        <span class="datetime-lbl">Giờ hiện tại</span>
      </div>
      <span class="datetime-sep">·</span>
      <div class="datetime-item">
        <span class="datetime-val" id="dateVal">--/--/----</span>
        <span class="datetime-lbl">Ngày hôm nay</span>
      </div>
    </div>

    <div class="key-section">
      <span class="key-label"><i class="fas fa-key" style="margin-right:6px;"></i>Key của bạn</span>
      <div class="key-input-wrap">
        <input class="key-input" id="keyInput" readonly placeholder="Đang tải key...">
        <button class="copy-icon-btn" onclick="copyKey()" title="Copy">
          <i class="fas fa-copy"></i>
        </button>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-copy" onclick="copyKey()">
        <i class="fas fa-copy"></i> Sao Chép Key
      </button>
      <button class="btn btn-music" id="musicBtn" onclick="toggleMusic()">
        <i class="fas fa-music" id="musicIcon"></i>
        <span id="musicBtnText">Bật Nhạc</span>
      </button>
    </div>

  </div>
</div>

<footer>
  <div class="footer-inner">
    <!-- ✅ Sửa branding: GameBooster → SuperPing -->
    <div class="footer-copy">© 2026 <span>SuperPing</span> · All rights reserved</div>
    <div class="footer-links">
      <a href="terms.html">Điều khoản</a>
      <a href="privacy.html">Bảo mật</a>
    </div>
  </div>
</footer>

<script>
  // ── CLOCK ──────────────────────────────────────────
  function updateTime() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('clockVal').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('dateVal').textContent =
      `${pad(now.getDate())}/${pad(now.getMonth()+1)}/${now.getFullYear()}`;
    // ✅ Sửa branding trong title
    document.title = `Key ${pad(now.getDate())}/${now.getMonth()+1} — SuperPing`;
  }
  updateTime();
  setInterval(updateTime, 1000);

  // ── GET KEY FROM URL PARAM ──────────────────────────
  (function getKey() {
    const key = new URLSearchParams(location.search).get('key') || '';
    const input = document.getElementById('keyInput');
    if (key) {
      input.value = key;
    } else {
      input.placeholder = 'Không tìm thấy key';
    }
  })();

  // ── COPY — có fallback cho mobile ────────────────────
  function copyKey() {
    const val = document.getElementById('keyInput').value;
    if (!val) return showToast('Không có key để copy!', true);

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(val)
        .then(() => showToast('Đã copy key!'))
        .catch(() => fallbackCopy(val));
    } else {
      fallbackCopy(val);
    }
  }

  // ✅ Fallback cho trình duyệt không hỗ trợ Clipboard API
  function fallbackCopy(val) {
    const input = document.getElementById('keyInput');
    input.select();
    input.setSelectionRange(0, 99999);
    try {
      document.execCommand('copy');
      showToast('Đã copy key!');
    } catch {
      showToast('Không thể copy, hãy copy thủ công!', true);
    }
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    const icon = t.querySelector('i');
    t.querySelector('span').textContent = msg;
    if (isError) {
      t.classList.add('error');
      icon.className = 'fas fa-times-circle';
    } else {
      t.classList.remove('error');
      icon.className = 'fas fa-check-circle';
    }
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── MUSIC ────────────────────────────────────────────
  function toggleMusic() {
    const music = document.getElementById('bgMusic');
    const btn   = document.getElementById('musicBtn');
    const txt   = document.getElementById('musicBtnText');
    const icon  = document.getElementById('musicIcon');
    if (music.paused) {
      music.play();
      txt.textContent = 'Tắt Nhạc';
      btn.classList.add('playing');
      icon.className = 'fas fa-pause';
    } else {
      music.pause();
      txt.textContent = 'Bật Nhạc';
      btn.classList.remove('playing');
      icon.className = 'fas fa-music';
    }
  }
</script>

</body>
</html>
